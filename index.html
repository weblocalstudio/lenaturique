<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LENATURIQUE | Luxury Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="manifest" href="/favicon/site.webmanifest">
    <script src="https://www.paypal.com/sdk/js?client-id=AY08p51kv4T10-_O2iOtMNp_tRh2SjT5cX5auqJThtmA9W5O8qUunH76qK7HpyeRyibgl3UxkenUw0sK&currency=EUR"></script>
    <style>
        /* Estilos críticos para el funcionamiento de los botones y bloqueo */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #f3f3f3;
            border-top: 4px solid #d4af37; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .login-section {
            background: #f4f4f4; padding: 10px 20px;
            display: flex; justify-content: flex-end; align-items: center;
            gap: 15px; font-family: 'Montserrat', sans-serif;
        }

        #admin-btn {
            display: none; background: #8b0000; color: white; border: none;
            padding: 5px 12px; border-radius: 3px; cursor: pointer; font-weight: bold;
        }

        .modal {
            display: none; position: fixed; z-index: 3000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); overflow-y: auto;
        }

        .modal-content {
            background: white; margin: 5% auto; padding: 30px;
            width: 90%; max-width: 400px; border-radius: 10px;
            text-align: center; border: 2px solid #d4af37;
        }

        .modal-content input {
            display: block; width: 100%; margin: 10px 0;
            padding: 12px; border: 1px solid #ddd; border-radius: 5px;
            box-sizing: border-box;
        }

        .modal-content input:disabled { background: #eee; cursor: not-allowed; }
        
        #btn-auth-submit {
            width: 100%; padding: 12px; background: #333; color: white;
            border: none; border-radius: 5px; cursor: pointer; font-weight: 600;
        }
        #btn-auth-submit:disabled { opacity: 0.6; cursor: wait; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top:15px; font-family:'Montserrat'">Cargando LENATURIQUE...</p>
    </div>

    <div class="login-section">
        <span id="user-welcome">Bienvenido, Invitado</span>
        <button id="btn-login-modal" onclick="mostrarModalLogin()">Iniciar Sesión</button>
        <button id="admin-btn" onclick="abrirAdmin()">⚙️ ADMIN</button>
        <button id="btn-logout" onclick="cerrarSesion()" style="display:none; background:none; border:1px solid #ccc; cursor:pointer; padding:5px 10px; font-size:0.7rem; margin-left:10px;">Cerrar Sesión</button>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">LE<span>NATURIQUE</span></div>
            <div class="cart-wrapper" id="open-cart-btn">
                <span class="cart-icon">🛒</span>
                <span class="cart-count" id="cart-count-nav">0</span>
            </div>
        </div>
    </nav>

    <main class="catalog-container">
        <section class="category-section">
            <h2 class="category-title">Joyería</h2>
            <div id="joyeria" class="products-grid"></div>
        </section>
        <section class="category-section">
            <h2 class="category-title">Perfumes</h2>
            <div id="perfumes" class="products-grid"></div>
        </section>
        <section class="category-section">
            <h2 class="category-title">Lociones Faciales</h2>
            <div id="faciales" class="products-grid"></div>
        </section>
        <section class="category-section">
            <h2 class="category-title">Lociones Corporales</h2>
            <div id="corporal" class="products-grid"></div>
        </section>
    </main>

<div id="cart-panel" class="cart-sidebar">
        <div class="cart-header">
            <h2>Tu Cesta</h2>
            <button id="close-cart" class="close-btn">&times;</button>
        </div>
        
        <div class="cart-body" id="cart-items-container">
            <!-- Aquí se cargan los productos -->
        </div>

        <div class="cart-footer">
            <!-- SECCIÓN DE CUPÓN -->
            <div class="coupon-container" style="display: flex; gap: 5px; margin-bottom: 10px; padding: 10px 0; border-top: 1px solid #eee;">
                <input type="text" id="coupon-code" class="coupon-input" placeholder="CÓDIGO" style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                <button class="btn-apply-coupon" onclick="aplicarCupon()" style="background: #333; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer;">Aplicar</button>
            </div>
            <div id="coupon-message" class="discount-msg" style="font-size: 0.8rem; margin-bottom: 10px; display: none;"></div>
            
            <!-- SECCIÓN DE TOTALES -->
            <div class="total-container">
                <div id="cart-total-price">
                    <!-- Aquí el JavaScript inyectará el Subtotal, Descuento, Envío y Total -->
                    Total: 0.00€
                </div>
            </div>
            
            <button class="checkout-btn" id="btn-checkout">FINALIZAR COMPRA</button>
        </div>
    </div>
    <div id="cart-overlay" class="overlay"></div>

    <div id="modal-login" class="modal">
        <div class="modal-content">
            <h3 id="auth-title">Identifícate</h3>
            <div id="auth-inputs">
                <input type="text" id="reg-nombre" placeholder="Nombre completo" style="display:none;">
                <input type="email" id="login-email" placeholder="Email">
                <input type="password" id="login-pass" placeholder="Contraseña">
            </div>
            <button id="btn-auth-submit" onclick="ejecutarAuth()">Entrar</button>
            <p id="auth-switch" style="margin-top:15px; font-size:0.8rem; cursor:pointer; text-decoration:underline;" onclick="toggleAuthMode()">
                ¿No tienes cuenta? Regístrate
            </p>
            <button onclick="cerrarModalLogin()" style="background:none; border:none; color:grey; margin-top:10px; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <div id="modal-pago" class="modal">
        <div class="modal-content">
            <span onclick="cerrarModalPago()" style="cursor:pointer; float:right; font-size:24px;">&times;</span>
            <h3 style="font-family:'Playfair Display'">Finalizar Pedido</h3>
            <p style="margin-bottom:20px;">Elige tu método de pago seguro</p>
            <div id="paypal-button-container"></div>
        </div>
    </div>

    <script>
// --- CONFIGURACIÓN ---
const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbyUnpvDiuir3Tt26UzP8FM9eGQ_6AtfbqMsVIinnOW83KzS_QPihb5jGx5A6Yv_h5jm/exec"; 
let productos = [];
let carrito = [];
let usuarioActual = null;
let isRegisterMode = false;

// --- 1. CARGA INICIAL Y PERSISTENCIA ---
async function cargarTienda() {
    const sesionGuardada = localStorage.getItem('yanbal_user');
    if (sesionGuardada) {
        usuarioActual = JSON.parse(sesionGuardada);
        aplicarInterfazUsuario(usuarioActual);
    }

    try {
        const res = await fetch(`${URL_APPS_SCRIPT}?action=getProducts`);
        productos = await res.json();
        pintarProductos();
        
        const loader = document.getElementById('loader');
        loader.style.opacity = "0";
        setTimeout(() => loader.style.display = "none", 500);
    } catch (e) {
        console.error("Error inicial:", e);
        alert("Error al conectar con la base de datos de productos.");
    }
}

function aplicarInterfazUsuario(user) {
    document.getElementById('user-welcome').textContent = "Hola, " + user.nombre;
    document.getElementById('btn-login-modal').style.display = 'none';
    document.getElementById('btn-logout').style.display = 'inline-block';
    
    const btnAdmin = document.getElementById('admin-btn');
    if (user.rol === 'admin') {
        btnAdmin.style.display = 'inline-block';
        btnAdmin.onclick = abrirAdmin;
    } else {
        if (btnAdmin) btnAdmin.remove();
    }
}

function cerrarSesion() {
    localStorage.removeItem('yanbal_user');
    location.reload();
}

// --- 2. DIBUJAR PRODUCTOS (CON MENSAJE DE CATEGORÍA VACÍA) ---
function pintarProductos() {
    const categorias = ['joyeria', 'perfumes', 'faciales', 'corporal'];
    
    categorias.forEach(cat => {
        const container = document.getElementById(cat);
        if(!container) return;
        
        container.innerHTML = "";
        const productosCategoria = productos.filter(p => p.categoria === cat);
        
        if (productosCategoria.length === 0) {
            container.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #888; padding: 20px;">Actualmente no hay productos disponibles en esta categoría.</p>`;
        } else {
            productosCategoria.forEach(p => {
                container.innerHTML += `
                    <div class="card">
                        <img src="${p.img}" onerror="this.src='img/logo.JPG'">
                        <h3>${p.nombre}</h3>
                        <p>${p.precio.toFixed(2)}€</p>
                        <button onclick="agregarAlCarrito(${p.id})">Añadir</button>
                    </div>`;
            });
        }
    });
}

// --- 3. LÓGICA DE AUTH ---
function mostrarModalLogin() { document.getElementById('modal-login').style.display = 'block'; }
function cerrarModalLogin() { document.getElementById('modal-login').style.display = 'none'; }

function toggleAuthMode() {
    isRegisterMode = !isRegisterMode;
    document.getElementById('auth-title').textContent = isRegisterMode ? "Crea tu cuenta" : "Identifícate";
    document.getElementById('btn-auth-submit').textContent = isRegisterMode ? "Registrarme" : "Entrar";
    document.getElementById('reg-nombre').style.display = isRegisterMode ? "block" : "none";
    document.getElementById('auth-switch').textContent = isRegisterMode ? "¿Ya tienes cuenta? Inicia sesión" : "¿No tienes cuenta? Regístrate";
}

async function ejecutarAuth() {
    const emailInp = document.getElementById('login-email');
    const passInp = document.getElementById('login-pass');
    const nomInp = document.getElementById('reg-nombre');
    const btn = document.getElementById('btn-auth-submit');

    [emailInp, passInp, nomInp, btn].forEach(el => el.disabled = true);
    btn.textContent = "Verificando...";

    try {
        const res = await fetch(URL_APPS_SCRIPT, {
            method: 'POST',
            body: JSON.stringify({
                action: isRegisterMode ? 'register' : 'login',
                email: emailInp.value,
                password: passInp.value,
                nombre: nomInp.value
            })
        });
        const data = await res.json();

        if(data.success) {
            if(isRegisterMode) {
                alert("¡Registro completado! Ahora puedes iniciar sesión.");
                toggleAuthMode();
            } else {
                usuarioActual = data;
                localStorage.setItem('yanbal_user', JSON.stringify(data));
                aplicarInterfazUsuario(data);
                cerrarModalLogin();
            }
        } else { 
            alert(data.msg); 
        }
    } catch (e) { 
        alert("Error de servidor. Revisa la conexión."); 
    } finally {
        [emailInp, passInp, nomInp, btn].forEach(el => el.disabled = false);
        btn.textContent = isRegisterMode ? "Registrarme" : "Entrar";
    }
}

// --- 4. CARRITO (GASTOS ENVÍO 0.50€ Y BOTÓN PAPELERA) ---
function agregarAlCarrito(id) {
    const prod = productos.find(p => p.id == id);
    const enCarrito = carrito.find(x => x.id == id);
    if(enCarrito) enCarrito.cantidad++; else carrito.push({...prod, cantidad: 1});
    renderizarCarrito();
    abrirCarrito();
}

let descuentoPorcentaje = 0; // Global para guardar el descuento

async function aplicarCupon() {
    const input = document.getElementById('coupon-code');
    const btn = document.querySelector('.btn-apply-coupon'); // Seleccionamos el botón
    const msg = document.getElementById('coupon-message');
    const codigo = input.value.trim().toUpperCase();

    if (!codigo) return;
    if (!usuarioActual) {
        alert("Debes iniciar sesión para usar cupones.");
        return;
    }

    // --- ESTADO DE CARGA ---
    // Guardamos el texto original para restaurarlo si hay error
    const textoOriginalBtn = btn.textContent;
    
    // Desactivamos controles
    input.disabled = true;
    btn.disabled = true;
    btn.textContent = "Verificando...";
    msg.style.display = "block";
    msg.textContent = "Consultando código...";
    msg.style.color = "#888";

    try {
        const url = `${URL_APPS_SCRIPT}?action=checkCoupon&code=${encodeURIComponent(codigo)}&email=${encodeURIComponent(usuarioActual.email)}`;
        
        const response = await fetch(url);
        const data = await response.json();

        if (data.success) {
            descuentoPorcentaje = data.pct;
            msg.textContent = `¡Cupón aplicado! Descuento del ${descuentoPorcentaje}%`;
            msg.style.color = "#27ae60"; // Verde éxito
            
            // Dejamos el botón desactivado con un mensaje de éxito
            btn.textContent = "¡Aplicado!";
            btn.style.backgroundColor = "#27ae60";
            
            renderizarCarrito(); 
        } else {
            // ERROR: El cupón no es válido o está caducado
            descuentoPorcentaje = 0;
            msg.textContent = data.msg;
            msg.style.color = "red";
            
            // Reactivamos para que el usuario pueda intentar con otro código
            input.disabled = false;
            btn.disabled = false;
            btn.textContent = textoOriginalBtn;
        }
    } catch (e) {
        console.error("Error cupón:", e);
        alert("Error de conexión con el servidor.");
        
        // Restauramos en caso de fallo crítico de red
        input.disabled = false;
        btn.disabled = false;
        btn.textContent = textoOriginalBtn;
        msg.style.display = "none";
    }
}


// ACTUALIZACIÓN DE LA FUNCIÓN RENDERIZAR CARRITO
function renderizarCarrito() {
    const cont = document.getElementById('cart-items-container');
    cont.innerHTML = "";
    let subtotal = 0;
    let unidadesTotales = 0;

    carrito.forEach(item => {
        subtotal += item.precio * item.cantidad;
        unidadesTotales += item.cantidad;
        cont.innerHTML += `
            <div class="cart-item" style="border-bottom: 1px solid #eee; padding: 10px 0;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <strong style="max-width: 70%;">${item.nombre}</strong>
                    <span>${(item.precio * item.cantidad).toFixed(2)}€</span>
                </div>
                <div class="quantity-controls" style="display: flex; align-items: center; gap: 10px; margin-top: 8px;">
                    <button onclick="modificarCantidad(${item.id}, -1)">-</button>
                    <input type="number" value="${item.cantidad}" onchange="cambiarCantidadManual(${item.id}, this.value)" class="quantity-input">
                    <button onclick="modificarCantidad(${item.id}, 1)">+</button>
                    <button onclick="eliminarDelCarrito(${item.id})" style="margin-left: auto; background: none; border: none; cursor: pointer;">🗑️</button>
                </div>
            </div>`;
    });

    // CÁLCULOS
    let montoDescuento = subtotal * (descuentoPorcentaje / 100);
    let subtotalConDescuento = subtotal - montoDescuento;
    let envio = unidadesTotales * 0.50; 
    window.totalFinalVenta = subtotalConDescuento + envio;

    // RENDERIZADO DE TOTALES
    let htmlTotales = `
        <div style="font-size: 0.9rem; color: #555;">Subtotal: ${subtotal.toFixed(2)}€</div>
    `;

    if (descuentoPorcentaje > 0) {
        htmlTotales += `<div style="font-size: 0.9rem; color: #27ae60;">Descuento (${descuentoPorcentaje}%): -${montoDescuento.toFixed(2)}€</div>`;
    }

    htmlTotales += `
        <div style="font-size: 0.9rem; color: #555;">Envío (0.50€/ud): ${envio.toFixed(2)}€</div>
        <div style="font-size: 1.1rem; font-weight: bold; margin-top: 5px; border-top: 1px solid #333; pt: 5px;">Total: ${window.totalFinalVenta.toFixed(2)}€</div>
    `;

    document.getElementById('cart-total-price').innerHTML = htmlTotales;
    document.getElementById('cart-count-nav').textContent = unidadesTotales;
    document.getElementById('btn-checkout').disabled = carrito.length === 0;
}

function modificarCantidad(id, cambio) {
    const item = carrito.find(x => x.id === id);
    if (item) {
        item.cantidad += cambio;
        if (item.cantidad <= 0) eliminarDelCarrito(id);
        else renderizarCarrito();
    }
}

function cambiarCantidadManual(id, valor) {
    const item = carrito.find(x => x.id === id);
    const nuevaCantidad = parseInt(valor);
    if (item && nuevaCantidad > 0) item.cantidad = nuevaCantidad;
    else if (nuevaCantidad <= 0) eliminarDelCarrito(id);
    renderizarCarrito();
}

function eliminarDelCarrito(id) {
    carrito = carrito.filter(item => item.id !== id);
    renderizarCarrito();
}

function abrirAdmin() {
    window.location.href = "admin";
}

// --- 5. PAYPAL ---
function cerrarModalPago() { document.getElementById('modal-pago').style.display = 'none'; }

document.getElementById('btn-checkout').onclick = () => {
    document.getElementById('modal-pago').style.display = 'block';
    cerrarCarrito();
};

paypal.Buttons({
    createOrder: (data, actions) => {
        return actions.order.create({
            purchase_units: [{ amount: { value: window.totalFinalVenta.toFixed(2) } }]
        });
    },
// --- BUSCA paypal.Buttons en tu index.html ---
// Busca donde tienes configurado paypal.Buttons
onApprove: (data, actions) => {
    return actions.order.capture().then(async (det) => {
        
        // --- REGISTRO DEL CUPÓN EN GOOGLE SHEETS ---
        const inputCupon = document.getElementById('coupon-code');
        const codigoParaRegistrar = inputCupon ? inputCupon.value.trim().toUpperCase() : "";

        if (descuentoPorcentaje > 0 && codigoParaRegistrar) {
            try {
                // Llamamos al doPost para registrar el uso
                await fetch(URL_APPS_SCRIPT, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "useCoupon",
                        code: codigoParaRegistrar,
                        email: usuarioActual.email
                    })
                });
            } catch (e) {
                console.error("No se pudo registrar el uso del cupón:", e);
            }
        }

        // --- FINALIZAR PROCESO ---
        alert("¡Pago realizado con éxito, " + det.payer.name.given_name + "!");
        carrito = []; 
        descuentoPorcentaje = 0;
        renderizarCarrito(); 
        cerrarModalPago();
        
        // Opcional: Recargar la página para limpiar todo el estado
        setTimeout(() => location.reload(), 2000);
    });
}
}).render('#paypal-button-container');

// --- HELPERS INTERFAZ ---
function abrirCarrito() { 
    document.getElementById('cart-panel').classList.add('open'); 
    document.getElementById('cart-overlay').classList.add('active'); 
}
function cerrarCarrito() { 
    document.getElementById('cart-panel').classList.remove('open'); 
    document.getElementById('cart-overlay').classList.remove('active'); 
}

document.getElementById('open-cart-btn').onclick = abrirCarrito;
document.getElementById('close-cart').onclick = cerrarCarrito;
document.getElementById('cart-overlay').onclick = cerrarCarrito;

cargarTienda();
    </script>
</body>
</html>
